<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Estacionamientos – Reserva Bosque Sereno</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="description" content="Mapa de estacionamientos del condominio Reserva Bosque Sereno.">
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1em 1.2em 3em;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4em;
            margin-bottom: 1.2em;
            color: var(--color-accent);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .map-card {
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
        }

        .map-card-header {
            display: flex;
            align-items: center;
            gap: 0.6em;
            padding: 0.75em 1em;
            border-bottom: 1px solid var(--color-border);
            background: #f7f5f0;
            font-size: 0.88em;
            font-weight: 700;
            color: var(--color-title);
        }

        /* Responsive iframe container — portrait on mobile, landscape on desktop */
        .map-ratio {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #e8e6e0;
        }

        @media (min-width: 600px) {
            .map-ratio {
                aspect-ratio: 4 / 3;
            }
        }

        @media (min-width: 900px) {
            .map-ratio {
                aspect-ratio: 4 / 3;
                min-height: 480px;
            }
        }

        .map-ratio iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-text">
            <h1>🗺️ Mapa de Estacionamientos</h1>
            <p>Distribución y ubicación de cajones en el condominio</p>
        </div>
        <img src="img/logo.png" alt="Logo Reserva Bosque Sereno">
    </header>
    <div id="menuInclude"></div>

    <div class="container">
        <a href="reglamento-estacionamientos.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Reglamento de Estacionamientos
        </a>

        <div class="map-card">
            <div class="map-card-header">
                <i class="fa-solid fa-location-dot"></i> Plano de estacionamientos – Reserva Bosque Sereno
            </div>
            <div class="map-ratio">
                <iframe
                    src="https://www.google.com/maps/d/u/0/embed?mid=15XkzKTdw7_YFsU68OFi7wAHVuF_6Sz8&ehbc=2E312F&noprof=1"
                    title="Mapa de estacionamientos Reserva Bosque Sereno" allowfullscreen loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>

    <div id="footerInclude"></div>
    <script src="includes/load-fragments.js"></script>
</body>

</html>
