<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TSV → CSV para Excel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            padding: 2.5rem 2rem;
            max-width: 580px;
            width: 100%;
        }

        h1 {
            font-size: 1.4rem;
            color: #1a1a2e;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.88rem;
            color: #666;
            margin-bottom: 2rem;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #b0bec5;
            border-radius: 10px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 1.2rem;
        }

        .drop-zone.hover {
            border-color: #4a90d9;
            background: #eaf3fb;
        }

        .drop-zone .icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .drop-zone p {
            font-size: 0.92rem;
            color: #555;
        }

        .drop-zone span {
            font-size: 0.8rem;
            color: #999;
            display: block;
            margin-top: 0.3rem;
        }

        #fileInput {
            display: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #aaa;
            font-size: 0.82rem;
            margin-bottom: 1.2rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        /* Textarea */
        textarea {
            width: 100%;
            height: 160px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.8rem;
            font-size: 0.82rem;
            font-family: 'Consolas', monospace;
            resize: vertical;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #4a90d9;
        }

        textarea::placeholder {
            color: #bbb;
        }

        /* Filename */
        .filename-row {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            margin-top: 1.2rem;
            margin-bottom: 1.4rem;
        }

        .filename-row label {
            font-size: 0.88rem;
            color: #555;
            white-space: nowrap;
        }

        .filename-row input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 7px;
            padding: 0.45rem 0.7rem;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filename-row input:focus {
            border-color: #4a90d9;
        }

        /* Button */
        button {
            width: 100%;
            padding: 0.85rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #b0bec5;
            cursor: not-allowed;
        }

        /* Status */
        .status {
            margin-top: 1rem;
            font-size: 0.88rem;
            text-align: center;
            min-height: 1.4em;
        }

        .status.ok {
            color: #16a34a;
        }

        .status.err {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📊 Convertir estado de cuenta a CSV</h1>
        <p class="subtitle">Sube el archivo TSV o pega el texto. Se descargará un CSV listo para Excel.</p>

        <!-- Drop zone -->
        <div class="drop-zone" id="dropZone">
            <span class="icon">📂</span>
            <p>Arrastra tu archivo aquí o <strong>haz clic para seleccionarlo</strong></p>
            <span>Formatos: .txt, .tsv, .csv (separado por tabuladores)</span>
        </div>
        <input type="file" id="fileInput" accept=".txt,.tsv,.csv">

        <div class="divider">o pega el texto directamente</div>

        <textarea id="textInput" placeholder="Día&#9;Concepto / Referencia&#9;Cargo&#9;Abono&#9;Saldo
30-04-2026&#9;SPEI ENVIADO BANREGIO/...&#9;754.00&#9;&#9;561,079.65"></textarea>

        <div class="filename-row">
            <label for="outputName">Nombre del archivo:</label>
            <input type="text" id="outputName" value="estado_cuenta_abril_2026" placeholder="nombre_sin_extension">
        </div>

        <button id="convertBtn">⬇ Convertir y descargar CSV</button>
        <p class="status" id="status"></p>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const textInput = document.getElementById('textInput');
        const convertBtn = document.getElementById('convertBtn');
        const outputName = document.getElementById('outputName');
        const statusEl = document.getElementById('status');

        // ── Drop zone interactions ──────────────────────────────
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('hover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) loadFile(fileInput.files[0]);
        });

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                textInput.value = e.target.result;
                // Sugerir nombre de salida basado en el archivo original
                const baseName = file.name.replace(/\.[^.]+$/, '');
                outputName.value = baseName;
                setStatus('Archivo cargado: ' + file.name, 'ok');
            };
            reader.onerror = () => setStatus('Error al leer el archivo.', 'err');
            reader.readAsText(file, 'UTF-8');
        }

        // ── Conversion ──────────────────────────────────────────
        convertBtn.addEventListener('click', () => {
            const raw = textInput.value.trim();
            if (!raw) { setStatus('No hay datos para convertir.', 'err'); return; }

            const lines = raw.split(/\r?\n/);
            const csvLines = lines.map(line => {
                const cols = line.split('\t');
                // Asegurar 5 columnas
                while (cols.length < 5) cols.push('');
                return cols.slice(0, 5).map(cell => {
                    // Escapar comillas y envolver en comillas si contiene coma, comillas o salto de línea
                    const escaped = cell.replace(/"/g, '""');
                    return /[",\n\r]/.test(escaped) ? `"${escaped}"` : escaped;
                }).join(',');
            });

            // UTF-8 BOM para que Excel detecte la codificación
            const bom = '\uFEFF';
            const csvContent = bom + csvLines.join('\r\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (outputName.value.trim() || 'estado_cuenta') + '.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            setStatus(`✔ Descargado: ${a.download}`, 'ok');
        });

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + (type || '');
        }
    </script>
</body>

</html>
