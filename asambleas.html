    <style>
        main {
            padding: 2.5em 1em 3em;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--color-white);
            border-radius: 10px;
            border: 1px solid var(--color-border);
            border-left: 4px solid var(--color-accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 1.4em 1.5em;
            margin-bottom: 1.5em;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8em;
            margin-bottom: 0.6em;
        }

        .card-year {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5em;
            color: var(--color-accent);
            line-height: 1;
        }

        .card-badge {
            font-size: 0.68em;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.2em 0.6em;
            border-radius: 4px;
            display: inline-block;
        }

        .badge-active {
            background: #edf7f1;
            color: #1e7e45;
        }

        .badge-past {
            background: #f0f0f0;
            color: #888;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1em;
            color: var(--color-title);
            margin: 0 0 0.3em;
        }

        .card-desc {
            font-size: 0.9em;
            color: #6a5a52;
            line-height: 1.55;
            margin: 0 0 0.8em;
        }

        .card-main-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4em;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.88em;
            color: var(--color-white);
            background: var(--color-accent);
            padding: 0.45em 1em;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .card-main-link:hover {
            background: #7a9550;
        }

        /* Sub-links (mesas de trabajo, etc.) */
        .card-sublinks {
            margin-top: 1em;
            padding-top: 0.8em;
            border-top: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            gap: 0.45em;
        }

        .card-sublinks-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.72em;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #999;
            margin-bottom: 0.1em;
        }

        .card-sublink {
            display: flex;
            align-items: center;
            gap: 0.5em;
            font-size: 0.88em;
            color: var(--color-text);
            text-decoration: none;
            padding: 0.35em 0.6em;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .card-sublink:hover {
            background: #f0f5e8;
        }

        .card-sublink .sl-icon {
            color: var(--color-accent);
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .card-sublink .sl-arrow {
            margin-left: auto;
            color: #ccc;
            font-size: 0.85em;
        }

        .card-sublink:hover .sl-arrow {
            color: var(--color-accent);
        }

        /* Past card is slightly muted */
        .card-past {
            border-left-color: #ccc;
        }

        .card-past .card-year {
            color: #aaa;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-text">
            <h1>Asambleas</h1>
            <p>Próxima asamblea, mesas de trabajo e histórico</p>
        </div>
        <img src="img/logo.png" alt="Logo Reserva Bosque Sereno">
