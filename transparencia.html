    <style>
        main {
            padding: 2.5em 1em 3em;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--color-white);
            border-radius: 10px;
            border: 1px solid var(--color-border);
            border-left: 4px solid var(--color-accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 1.4em 1.5em;
            margin-bottom: 1.5em;
            text-decoration: none;
            color: var(--color-text);
            display: flex;
            align-items: flex-start;
            gap: 1.3em;
            transition: box-shadow 0.2s, transform 0.15s;
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .card-emoji {
            font-size: 1.8em;
            flex-shrink: 0;
            line-height: 1;
            margin-top: 0.1em;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05em;
            color: var(--color-title);
            margin: 0 0 0.25em;
        }

        .card-desc {
            font-size: 0.88em;
            color: #6a5a52;
            line-height: 1.55;
            margin: 0;
        }

        .card-cta {
            display: inline-block;
            font-size: 0.82em;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            color: var(--color-accent);
            margin-top: 0.6em;
        }

        .card:hover .card-cta {
            color: #5a7e3a;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-text">
            <h1>Transparencia</h1>
            <p>Rendición de cuentas y avances del condominio</p>
        </div>

</body>
